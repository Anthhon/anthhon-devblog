{{ define "main" }}

<div class="section-header">
  <span class="section-header-label">&#x25BA; <strong>ERROR 404</strong></span>
</div>
<div class="section-underline"></div>

<div class="post-single" style="text-align:center; padding: 60px 24px;">
  <div style="font-family: var(--font-head); font-size: 80px; color: var(--olive-dark); line-height:1; margin-bottom: 16px;">404</div>
  <h1 class="post-single-title" style="font-size: 20px; margin-bottom: 12px;">Page Not Found</h1>
  <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 24px;">
    The page you're looking for doesn't exist or was moved.
  </p>
  <a href="{{ "/" | relURL }}" class="btn-primary">&#x2190; Back to Home</a>
</div>

{{ end }}
